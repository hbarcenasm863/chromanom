<style>
:root{
  --bg:#f6fafe;--surf:#fff;--surf2:#e8f4fb;--brd:#d0e6f5;

.nav-links{display:flex;gap:4px;align-items:center}
.nav-link{color:rgba(255,255,255,.75);text-decoration:none;padding:5px 10px;border-radius:6px;font-size:.78rem;font-weight:500;transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,.12);color:#fff}
.nav-link.active{background:rgba(255,255,255,.2);color:#fff}
.editor-wrap{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}
.toolbar{width:62px;background:var(--surf);border-right:1.5px solid var(--brd);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;overflow-y:auto;flex-shrink:0}
.tb-sep{width:80%;height:1.5px;background:var(--brd);margin:4px 0;flex-shrink:0}
.tb-lbl{font-size:.48rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dimmer);padding:2px 0}
.tool-btn{width:48px;height:36px;border:1.5px solid var(--brd);border-radius:var(--rs);background:var(--surf);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tool-btn:hover{border-color:var(--c1);color:var(--c1);background:var(--c1b)}
.tool-btn.active{background:var(--tx);color:#fff;border-color:var(--tx)}
.tool-btn.C{color:#0d2d42}.tool-btn.O{color:#c8230a}.tool-btn.N{color:#0033aa}
.tool-btn.Cl{color:#1a7a1a;font-size:.65rem}.tool-btn.Br{color:#8b1a1a;font-size:.65rem}
.tool-btn.F{color:#3366aa}.tool-btn.H{color:#556677}
.tool-btn.active.C,.tool-btn.active.O,.tool-btn.active.N,.tool-btn.active.Cl,.tool-btn.active.Br,.tool-btn.active.F,.tool-btn.active.H{background:var(--tx);color:#fff}
.tool-btn.ring{font-size:.55rem;line-height:1.2;text-align:center}
.tool-btn.erase{color:#c0392b}.tool-btn.erase:hover{background:#fdf2f2;border-color:#c0392b}
.tool-btn.erase.active{background:#c0392b;color:#fff;border-color:#c0392b}
.tool-btn.clear-btn{color:var(--c2t);font-size:.6rem}.tool-btn.undo-btn{color:var(--dim);font-size:.65rem}
.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#mol-svg{flex:1;cursor:crosshair;display:block;background:transparent}
.info-bar{height:54px;background:var(--surf);border-top:1.5px solid var(--brd);display:flex;align-items:center;gap:14px;padding:0 16px;flex-shrink:0}
.info-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dimmer)}
.smiles-out{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--tx);background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:5px 10px;min-width:120px;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.formula-out{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:700;color:var(--c4t);background:var(--c4b);border:1px solid rgba(160,82,127,.2);border-radius:var(--rs);padding:5px 10px;min-width:70px;text-align:center}
.tool-hint{font-size:.7rem;color:var(--dimmer);margin-left:auto}
</style>

<div class="editor-wrap">
  <div class="toolbar" id="toolbar">
    <span class="tb-lbl">Átomo</span>
    <button class="tool-btn C active" data-tool="atom" data-atom="C" title="Carbono">C</button>
    <button class="tool-btn H" data-tool="atom" data-atom="H" title="Hidrógeno">H</button>
    <button class="tool-btn O" data-tool="atom" data-atom="O" title="Oxígeno">O</button>
    <button class="tool-btn N" data-tool="atom" data-atom="N" title="Nitrógeno">N</button>
    <button class="tool-btn Cl" data-tool="atom" data-atom="Cl" title="Cloro">Cl</button>
    <button class="tool-btn Br" data-tool="atom" data-atom="Br" title="Bromo">Br</button>

    <button class="tool-btn" data-tool="bond" data-bond="1" title="Enlace simple">─</button>
    <button class="tool-btn" data-tool="bond" data-bond="2" title="Enlace doble">═</button>
    <button class="tool-btn" data-tool="bond" data-bond="3" title="Enlace triple">≡</button>

    <button class="tool-btn ring" data-tool="ring" data-ring="cyclohexane" title="Ciclohexano">cHex</button>
    <button class="tool-btn ring" data-tool="ring" data-ring="cyclopentane" title="Ciclopentano">cPen</button>
    <button class="tool-btn ring" data-tool="ring" data-ring="cyclobutane" title="Ciclobutano">cBut</button>
    <div class="tb-sep"></div>
    <span class="tb-lbl">Mover</span>
    <button class="tool-btn" data-tool="select" title="Mover átomo">✥</button>
    <div class="tb-sep"></div>
    <button class="tool-btn erase" data-tool="erase" title="Borrar">✕</button>
    <button class="tool-btn undo-btn" id="btn-undo" title="Deshacer (Ctrl+Z)">↩</button>
    <button class="tool-btn clear-btn" id="btn-clear" title="Borrar todo">⬜</button>
  </div>
  <div class="canvas-area">
    <svg id="mol-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="info-bar">
      <span class="info-label">SMILES</span>
      <div class="smiles-out" id="smiles-out">—</div>
      <span class="info-label">Fórmula</span>
      <div class="formula-out" id="formula-out">—</div>
      <span class="tool-hint" id="tool-hint">Herramienta: Átomo C · clic para colocar</span>
    </div>
  </div>

<script>
const svg = document.getElementById('mol-svg');
const smilesOut = document.getElementById('smiles-out');
const formulaOut = document.getElementById('formula-out');
const toolHint = document.getElementById('tool-hint');

let atoms = [];
let bonds = [];
let history = [];
let activeTool = 'atom';
let activeAtom = 'C';
let activeBond = 1;
let nextId = 1;
let dragState = null;
let hoverAtom = null;
let hoverBond = null;

const ATOM_COLORS = {C:'#0d2d42',O:'#c8230a',N:'#0033aa',Cl:'#1a7a1a',Br:'#8b1a1a',F:'#3366aa',H:'#556677'};
const ATOM_VALENCE = {C:4,H:1,O:2,N:3,F:1,Cl:1,Br:1,I:1,S:2,B:3,P:3};
const ORGANIC_SUBSET = new Set(['B','C','N','O','P','S','F','Cl','Br','I']);
const ATOM_R = 12;

function pushHistory() {
  history.push({atoms:JSON.parse(JSON.stringify(atoms)),bonds:JSON.parse(JSON.stringify(bonds))});
  if(history.length > 20) history.shift();
}

function undo() {
  if(!history.length) return;
  const s = history.pop();
  atoms = s.atoms; bonds = s.bonds;
  nextId = Math.max(0,...atoms.map(a=>a.id),0) + 1;
  render(); updateInfo();
}

function clearAll() {
  pushHistory();
  atoms=[]; bonds=[]; nextId=1;
  render(); updateInfo();
}

function getAtom(id) { return atoms.find(a=>a.id===id); }

function svgPt(e) {
  const r = svg.getBoundingClientRect();
  return {x: e.clientX - r.left, y: e.clientY - r.top};
}

function atomAt(x, y, excludeId) {
  for(const a of atoms) {
    if(a.id === excludeId) continue;
    const dx = a.x-x, dy = a.y-y;
    if(Math.sqrt(dx*dx+dy*dy) < ATOM_R+4) return a;
  }
  return null;
}

function bondAt(x, y) {
  for(const b of bonds) {
    const a1 = getAtom(b.from), a2 = getAtom(b.to);
    if(!a1||!a2) continue;
    const dx = a2.x-a1.x, dy = a2.y-a1.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if(len<1) continue;
    const t = ((x-a1.x)*dx+(y-a1.y)*dy)/(len*len);
    if(t<0||t>1) continue;
    const px = a1.x+t*dx, py = a1.y+t*dy;
    const d = Math.sqrt((x-px)**2+(y-py)**2);
    if(d<6) return b;
  }
  return null;
}

function getBond(id1, id2) {
  return bonds.find(b=>(b.from===id1&&b.to===id2)||(b.from===id2&&b.to===id1));
}

function addAtom(x, y, sym) {
  const a = {id:nextId++, x, y, sym: sym||activeAtom};
  atoms.push(a);
  return a;
}

function addBond(id1, id2, order) {
  const ex = getBond(id1, id2);
  if(ex) { ex.order = order||activeBond; }
  else { bonds.push({from:id1, to:id2, order:order||activeBond}); }
}

function removeAtom(id) {
  atoms = atoms.filter(a=>a.id!==id);
  bonds = bonds.filter(b=>b.from!==id&&b.to!==id);
}

function removeBond(b) {
  bonds = bonds.filter(x=>x!==b);
}

function placeRing(type, cx, cy) {
  const configs = {
    benzene:   {n:6,r:55,bonds:[2,1,2,1,2,1]},
    cyclohexane:{n:6,r:55,bonds:[1,1,1,1,1,1]},
    cyclopentane:{n:5,r:46,bonds:[1,1,1,1,1]},
    cyclobutane:{n:4,r:40,bonds:[1,1,1,1]}
  };
  const cfg = configs[type]; if(!cfg) return;
  pushHistory();
  const ids = [];
  for(let i=0;i<cfg.n;i++) {
    const angle = (2*Math.PI*i/cfg.n) - Math.PI/2;
    const x = cx + cfg.r*Math.cos(angle);
    const y = cy + cfg.r*Math.sin(angle);
    const existing = atomAt(x, y, -1);
    if(existing) ids.push(existing.id);
    else ids.push(addAtom(Math.round(x), Math.round(y), 'C').id);
  }
  for(let i=0;i<cfg.n;i++) {
    addBond(ids[i], ids[(i+1)%cfg.n], cfg.bonds[i]);
  }
  render(); updateInfo();
}

function render() {
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  for(const b of bonds) {
    const a1 = getAtom(b.from), a2 = getAtom(b.to);
    if(!a1||!a2) continue;
    const isHover = b === hoverBond;
    const dx = a2.x-a1.x, dy = a2.y-a1.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    const shrink = ATOM_R;
    const sx1 = a1.x + dx/len*shrink, sy1 = a1.y + dy/len*shrink;
    const sx2 = a2.x - dx/len*shrink, sy2 = a2.y - dy/len*shrink;
    const color = isHover ? '#c0392b' : '#2a3f52';
    const sw = isHover ? 2.5 : 1.8;
    if(b.order===1) {
      drawLine(sx1,sy1,sx2,sy2,color,sw);
    } else if(b.order===2) {
      const off = 2.5;
      drawLine(sx1+nx*off,sy1+ny*off,sx2+nx*off,sy2+ny*off,color,sw);
      drawLine(sx1-nx*off,sy1-ny*off,sx2-nx*off,sy2-ny*off,color,sw);
    } else if(b.order===3) {
      const off = 3.5;
      drawLine(sx1,sy1,sx2,sy2,color,sw);
      drawLine(sx1+nx*off,sy1+ny*off,sx2+nx*off,sy2+ny*off,color,sw);
      drawLine(sx1-nx*off,sy1-ny*off,sx2-nx*off,sy2-ny*off,color,sw);
    }
  }

  if(dragState && dragState.type==='bond' && dragState.from) {
    const a = getAtom(dragState.from);
    if(a) drawLine(a.x,a.y,dragState.x,dragState.y,'rgba(0,114,178,.4)',1.5,true);
  }

  for(const a of atoms) {
    const isHover = a === hoverAtom;
    const col = ATOM_COLORS[a.sym] || '#0d2d42';
    if(isHover) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',a.x); circle.setAttribute('cy',a.y);
      circle.setAttribute('r', ATOM_R+3);
      circle.setAttribute('fill', activeTool==='erase' ? 'rgba(192,57,43,.15)' : 'rgba(0,114,178,.12)');
      circle.setAttribute('stroke', activeTool==='erase' ? '#c0392b' : '#0072B2');
      circle.setAttribute('stroke-width','1.5');
      svg.appendChild(circle);
    }
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const lbl = a.sym;
    const w = lbl.length > 1 ? 22 : 14;
    bg.setAttribute('x', a.x - w/2); bg.setAttribute('y', a.y - 9);
    bg.setAttribute('width', w); bg.setAttribute('height', 16);
    bg.setAttribute('fill', 'var(--bg)'); bg.setAttribute('rx','2');
    svg.appendChild(bg);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', a.x); t.setAttribute('y', a.y+4);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','Courier New, monospace');
    t.setAttribute('font-size','13');
    t.setAttribute('font-weight','bold');
    t.setAttribute('fill', col);
    t.setAttribute('pointer-events','none');
    t.textContent = lbl;
    svg.appendChild(t);
  }
}

function drawLine(x1,y1,x2,y2,color,sw,dashed) {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);
  l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',color);l.setAttribute('stroke-width',sw);
  l.setAttribute('stroke-linecap','round');
  if(dashed) l.setAttribute('stroke-dasharray','5,4');
  svg.appendChild(l);
}

svg.addEventListener('mousemove', e => {
  const p = svgPt(e);
  if(dragState) {
    if(dragState.type==='move') {
      const a = getAtom(dragState.atomId);
      if(a) { a.x=p.x; a.y=p.y; }
      render(); return;
    }
    if(dragState.type==='bond') {
      dragState.x=p.x; dragState.y=p.y;
      hoverAtom = atomAt(p.x,p.y,dragState.from);
      hoverBond = null; render(); return;
    }
  }
  const prev = hoverAtom, prevB = hoverBond;
  hoverAtom = atomAt(p.x,p.y,-1);
  hoverBond = hoverAtom ? null : bondAt(p.x,p.y);
  if(hoverAtom!==prev || hoverBond!==prevB) render();
});

svg.addEventListener('mousedown', e => {
  if(e.button!==0) return;
  const p = svgPt(e);
  const a = atomAt(p.x,p.y,-1);
  const b = a ? null : bondAt(p.x,p.y);

  if(activeTool==='select') {
    if(a) { pushHistory(); dragState={type:'move',atomId:a.id}; }
    return;
  }
  if(activeTool==='erase') {
    if(a) { pushHistory(); removeAtom(a.id); render(); updateInfo(); }
    else if(b) { pushHistory(); removeBond(b); render(); updateInfo(); }
    return;
  }
  if(activeTool==='atom') {
    if(a) { pushHistory(); a.sym=activeAtom; render(); updateInfo(); }
    else { pushHistory(); addAtom(p.x,p.y,activeAtom); render(); updateInfo(); }
    return;
  }
  if(activeTool==='bond') {
    if(a) {
      dragState = {type:'bond', from:a.id, x:p.x, y:p.y};
    } else {
      pushHistory();
      const na = addAtom(p.x,p.y,'C');
      dragState = {type:'bond', from:na.id, x:p.x, y:p.y};
      render(); updateInfo();
    }
  }
});

svg.addEventListener('mouseup', e => {
  if(!dragState) return;
  const p = svgPt(e);
  if(dragState.type==='move') { render(); updateInfo(); }
  if(dragState.type==='bond') {
    let target = atomAt(p.x,p.y,dragState.from);
    if(!target && dragState.from !== undefined) {
      const dx = p.x - (getAtom(dragState.from)||{x:p.x}).x;
      const dy = p.y - (getAtom(dragState.from)||{y:p.y}).y;
      if(Math.sqrt(dx*dx+dy*dy) > 15) {
        pushHistory();
        target = addAtom(p.x,p.y,'C');
      }
    }
    if(target && target.id !== dragState.from) {
      pushHistory();
      addBond(dragState.from, target.id, activeBond);
    }
    render(); updateInfo();
  }
  dragState = null; hoverAtom = null; hoverBond = null;
  render();
});

svg.addEventListener('mouseleave', () => {
  if(dragState && dragState.type==='bond') { dragState=null; }
  hoverAtom=null; hoverBond=null; render();
});

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-tool]');
  if(!btn) return;
  const tool = btn.dataset.tool;
  if(tool==='ring') {
    const r = svg.getBoundingClientRect();
    placeRing(btn.dataset.ring, r.width/2, r.height/2);
    return;
  }
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTool = tool;
  if(tool==='atom') activeAtom = btn.dataset.atom;
  if(tool==='bond') activeBond = parseInt(btn.dataset.bond);
  updateHint();
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-clear').addEventListener('click', clearAll);
document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();} });

function updateHint() {
  const hints = {atom:`Átomo ${activeAtom} · clic para colocar`,bond:`Enlace ${activeBond===1?'simple':activeBond===2?'doble':'triple'} · arrastra entre átomos`,select:'Mover · arrastra un átomo',erase:'Borrar · clic en átomo o enlace',ring:'Anillo · clic para centrar en canvas'};
  toolHint.textContent = 'Herramienta: ' + (hints[activeTool]||activeTool);
}

function atomBondOrder(id) {
  let total = 0;
  for(const b of bonds) if(b.from===id||b.to===id) total+=b.order;
  return total;
}

function implicitH(atom) {
  const v = ATOM_VALENCE[atom.sym];
  if(v===undefined) return 0;
  const used = atomBondOrder(atom.id);
  return Math.max(0, v - used);
}

function buildSMILES() {
  if(!atoms.length) return '';
  const adj = {};
  for(const a of atoms) adj[a.id]=[];
  for(const b of bonds) {
    adj[b.from].push({id:b.to,order:b.order});
    adj[b.to].push({id:b.from,order:b.order});
  }
  const visited = new Set();
  const ringClosures = {};
  let ringNum = 1;
  const atomRingNums = {};

  function dfs(id, parentId) {
    visited.add(id);
    const a = getAtom(id);
    let sym = a.sym;
    const hCount = implicitH(a);
    const neighbors = adj[id];
    let closures = '';
    const children = [];
    for(const nb of neighbors) {
      if(nb.id === parentId) continue;
      if(visited.has(nb.id)) {
        const key = [Math.min(id,nb.id),Math.max(id,nb.id)].join('-');
        if(!ringClosures[key]) {
          const num = ringNum++;
          ringClosures[key] = num;
          if(!atomRingNums[id]) atomRingNums[id]=[];
          atomRingNums[id].push({num,order:nb.order,open:true});
          if(!atomRingNums[nb.id]) atomRingNums[nb.id]=[];
          atomRingNums[nb.id].push({num,order:nb.order,open:false});
        }
      } else {
        children.push(nb);
      }
    }

    let cStr = '';
    const rNums = atomRingNums[id]||[];
    for(const rc of rNums) {
      const bond = rc.order===2?'=':rc.order===3?'#':'';
      if(rc.open) cStr += bond + (rc.num>=10?'%'+rc.num:rc.num);
      else cStr += bond + (rc.num>=10?'%'+rc.num:rc.num);
    }

    let needsBracket = !ORGANIC_SUBSET.has(sym) || hCount > 0 && (sym==='C'&&hCount>0&&false);
    if(!ORGANIC_SUBSET.has(sym)) {
      sym = '['+sym+(hCount>0?'H'+(hCount>1?hCount:''):'')+']';
    } else {
      sym = sym;
    }

    let result = sym + cStr;
    const branchParts = [];
    for(let i=0;i<children.length-1;i++) {
      const nb = children[i];
      const bondChar = nb.order===2?'=':nb.order===3?'#':'';
      branchParts.push('('+bondChar+dfs(nb.id,id)+')');
    }
    if(children.length > 0) {
      const last = children[children.length-1];
      const bondChar = last.order===2?'=':last.order===3?'#':'';
      result += branchParts.join('') + bondChar + dfs(last.id,id);
    } else {
      result += branchParts.join('');
    }
    return result;
  }

  const components = [];
  for(const a of atoms) {
    if(!visited.has(a.id)) {
      components.push(dfs(a.id, null));
    }
  }
  return components.join('.');
}

function buildFormula() {
  if(!atoms.length) return '';
  const counts = {};
  for(const a of atoms) {
    counts[a.sym] = (counts[a.sym]||0) + 1;
    const h = implicitH(a);
    if(h>0) counts['H'] = (counts['H']||0) + h;
  }
  const order = ['C','H','N','O','F','Cl','Br','I','S','P','B'];
  let f = '';
  for(const el of order) {
    if(counts[el]) f += el + (counts[el]>1 ? toSub(counts[el]) : '');
  }
  for(const el of Object.keys(counts)) {
    if(!order.includes(el)&&counts[el]) f += el + (counts[el]>1 ? toSub(counts[el]) : '');
  }
  return f;
}

function toSub(n) {
  return String(n).replace(/\d/g, d=>'₀₁₂₃₄₅₆₇₈₉'[d]);
}

function updateInfo() {
  const s = buildSMILES();
  smilesOut.textContent = s || '—';
  smilesOut.title = s;
  formulaOut.textContent = buildFormula() || '—';
}

updateHint();
render();
updateInfo();
</script>
